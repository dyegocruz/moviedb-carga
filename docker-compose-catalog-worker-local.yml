services:
  catalog-process-worker:
    image: catalog-process-worker-local:1.0
    build:
      context: .
      dockerfile: Dockerfile.catalog-process-worker
      args:
        - GO_ENV=${GO_ENV}
    network_mode: "host"
    logging:
      driver: "json-file"
      options:
        max-size: 100m
        max-file: "3"
        labels: "production_status"
        env: "os"
    deploy:
      replicas: 4 # Número de réplicas do worker
